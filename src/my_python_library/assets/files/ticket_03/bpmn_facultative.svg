<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1 L8 5 L2 9 z" fill="#444444"/>
    </marker>
  </defs>

  <!-- Pool: внешняя рамка -->
  <rect x="20" y="20" width="1160" height="500" rx="6"
        fill="none" stroke="#666666" stroke-width="1.2"/>

  <!-- Заголовок пула (вертикальный) -->
  <text x="42" y="270.0" text-anchor="middle" font-family="DejaVu Sans"
        font-size="14" font-weight="700" fill="#2C2C2A"
        transform="rotate(-90 42 270.0)">Процесс «Факультатив»</text>

  <!-- Разделители дорожек -->
  <line x1="65" y1="20" x2="65" y2="520" stroke="#666666" stroke-width="1"/>
  <line x1="140" y1="20" x2="140" y2="520" stroke="#666666" stroke-width="0.8"/>
  <line x1="65" y1="160" x2="1180" y2="160" stroke="#666666" stroke-width="0.8"/>
  <line x1="65" y1="280" x2="1180" y2="280" stroke="#666666" stroke-width="0.8"/>
  <line x1="65" y1="400" x2="1180" y2="400" stroke="#666666" stroke-width="0.8"/>

  <!-- Подписи дорожек -->
  <text x="102" y="100" text-anchor="middle" dominant-baseline="central"
        font-family="DejaVu Sans" font-size="13" font-weight="700"
        fill="#04342C">Деканат</text>
  <text x="102" y="220" text-anchor="middle" dominant-baseline="central"
        font-family="DejaVu Sans" font-size="13" font-weight="700"
        fill="#042C53">Студент</text>
  <text x="102" y="340" text-anchor="middle" dominant-baseline="central"
        font-family="DejaVu Sans" font-size="13" font-weight="700"
        fill="#412402">Система</text>
  <text x="102" y="460" text-anchor="middle" dominant-baseline="central"
        font-family="DejaVu Sans" font-size="13" font-weight="700"
        fill="#26215C">Преподаватель</text>

  <!-- ============ ЭЛЕМЕНТЫ ============ -->

  <!-- Lane 1: Деканат -->
  
    <g>
      <circle cx="180" cy="100" r="18" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.5"/>
      <text x="180" y="138" text-anchor="middle" font-family="DejaVu Sans"
            font-size="12" fill="#412402">Старт</text>
    </g>
  
    <g>
      <rect x="265" y="75" width="130" height="50" rx="8"
            fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
      <text x="330.0" y="94.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="14" font-weight="600"
            fill="#04342C">Сформировать</text>
      <text x="330.0" y="110.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="12"
            fill="#04342C">список курсов</text>
    </g>
  
    <g>
      <rect x="415" y="75" width="130" height="50" rx="8"
            fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
      <text x="480.0" y="94.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="14" font-weight="600"
            fill="#04342C">Объявить</text>
      <text x="480.0" y="110.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="12"
            fill="#04342C">набор группы</text>
    </g>

  <!-- Lane 2: Студент -->
  
    <g>
      <rect x="415" y="195" width="130" height="50" rx="8"
            fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
      <text x="480.0" y="214.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="14" font-weight="600"
            fill="#042C53">Выбрать курс</text>
      <text x="480.0" y="230.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="12"
            fill="#042C53">из каталога</text>
    </g>
  
    <g>
      <rect x="565" y="195" width="130" height="50" rx="8"
            fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
      <text x="630.0" y="214.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="14" font-weight="600"
            fill="#042C53">Подать заявку</text>
      <text x="630.0" y="230.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="12"
            fill="#042C53">в систему</text>
    </g>

  <!-- Lane 3: Система -->
  
    <g>
      <circle cx="180" cy="340" r="18" fill="#FFFFFF" stroke="#A32D2D" stroke-width="3"/>
      <text x="180" y="378" text-anchor="middle" font-family="DejaVu Sans"
            font-size="12" fill="#412402">Отказ</text>
    </g>
  
    <g>
      <polygon points="630,305 670,340 630,375 590,340" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
      <text x="630" y="390" text-anchor="middle" font-family="DejaVu Sans"
            font-size="12" fill="#412402">Места есть?</text>
    </g>
  
    <g>
      <rect x="715" y="315" width="130" height="50" rx="8"
            fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
      <text x="780.0" y="334.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="14" font-weight="600"
            fill="#412402">Зачислить</text>
      <text x="780.0" y="350.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="12"
            fill="#412402">студента</text>
    </g>
  
    <g>
      <rect x="865" y="315" width="130" height="50" rx="8"
            fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
      <text x="930.0" y="334.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="14" font-weight="600"
            fill="#412402">Внести</text>
      <text x="930.0" y="350.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="12"
            fill="#412402">оценку</text>
    </g>
  
    <g>
      <circle cx="1080" cy="340" r="18" fill="#FFFFFF" stroke="#0F6E56" stroke-width="3"/>
      <text x="1080" y="378" text-anchor="middle" font-family="DejaVu Sans"
            font-size="12" fill="#412402">Конец</text>
    </g>

  <!-- Lane 4: Преподаватель -->
  
    <g>
      <rect x="715" y="435" width="130" height="50" rx="8"
            fill="#EEEDFE" stroke="#3C3489" stroke-width="1.2"/>
      <text x="780.0" y="454.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="14" font-weight="600"
            fill="#26215C">Провести</text>
      <text x="780.0" y="470.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="12"
            fill="#26215C">занятия</text>
    </g>
  
    <g>
      <rect x="865" y="435" width="130" height="50" rx="8"
            fill="#EEEDFE" stroke="#3C3489" stroke-width="1.2"/>
      <text x="930.0" y="454.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="14" font-weight="600"
            fill="#26215C">Принять зачёт</text>
      <text x="930.0" y="470.0" text-anchor="middle" dominant-baseline="central"
            font-family="DejaVu Sans" font-size="12"
            fill="#26215C">/ экзамен</text>
    </g>

  <!-- ============ СТРЕЛКИ ============ -->

  <!-- 1. Старт → Сформировать -->
  <line x1="198" y1="100" x2="265" y2="100"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 2. Сформировать → Объявить -->
  <line x1="395" y1="100" x2="415" y2="100"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 3. Объявить ↓ → Выбрать курс -->
  <line x1="480" y1="125" x2="480" y2="195"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 4. Выбрать → Подать заявку -->
  <line x1="545" y1="220" x2="565" y2="220"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 5. Подать заявку ↓ → Gateway -->
  <line x1="630" y1="245" x2="630" y2="305"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 6. Gateway → Зачислить (да, право) -->
  <line x1="670" y1="340" x2="715" y2="340"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="692.5" y="332.0" text-anchor="middle"
                              font-family="DejaVu Sans" font-size="11"
                              fill="#444444">да</text>
  <!-- 7. Gateway → Отказ (нет, влево) -->
  <line x1="590" y1="340" x2="198" y2="340"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="394.0" y="332.0" text-anchor="middle"
                              font-family="DejaVu Sans" font-size="11"
                              fill="#444444">нет</text>
  <!-- 8. Зачислить ↓ → Провести -->
  <line x1="780" y1="365" x2="780" y2="435"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 9. Провести → Принять зачёт -->
  <line x1="845" y1="460" x2="865" y2="460"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 10. Принять зачёт ↑ → Внести оценку -->
  <line x1="930" y1="435" x2="930" y2="365"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 11. Внести оценку → End -->
  <line x1="995" y1="340" x2="1062" y2="340"
                       stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
